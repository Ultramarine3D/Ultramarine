[gcode_macro PRINT_START]
gcode:
    # --- Parameters passed from slicer ---
    {% set BED_TEMP      = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}
    {% set AREA_START    = params.AREA_START|default("0,0")|string %}
    {% set AREA_END      = params.AREA_END|default("350,350")|string %}

    # --- Parse print area ---
    {% set area_start_x = AREA_START.split(",")[0]|float %}
    {% set area_start_y = AREA_START.split(",")[1]|float %}
    {% set area_end_x   = AREA_END.split(",")[0]|float %}
    {% set area_end_y   = AREA_END.split(",")[1]|float %}

    # --- Dual heater zone logic (split at X=175) ---
    # Heater names must match your printer.cfg: [heater_bed] and [heater_generic bed_right]
    # or [heater_bed left] / [heater_bed right] — adjust SET_HEATER_TEMPERATURE calls below
    {% set BED_MID = 175.0 %}
    {% set use_left  = true if area_start_x < BED_MID else false %}
    {% set use_right = true if area_end_x   > BED_MID else false %}

    # ---- 1. SELECTIVE BED HEATING (no-wait) ----
    {% if use_left and use_right %}
        M117 Heating: BOTH sides
        M140 S{BED_TEMP}                                          # Main bed heater (left zone)
        SET_HEATER_TEMPERATURE HEATER=bed_right TARGET={BED_TEMP} # Right zone heater
    {% elif use_left %}
        M117 Heating: LEFT side only
        M140 S{BED_TEMP}                                          # Left zone heater only
        SET_HEATER_TEMPERATURE HEATER=bed_right TARGET=0          # Right zone OFF
    {% else %}
        M117 Heating: RIGHT side only
        M140 S0                                                    # Left zone OFF
        SET_HEATER_TEMPERATURE HEATER=bed_right TARGET={BED_TEMP} # Right zone heater only
    {% endif %}

    M104 S150                     # Preheat nozzle to no-drip temp

    # ---- 2. HOME SEQUENCE: X → Y → X → Z ----
    G28 X                         # Home X first
    G28 Y                         # Home Y
    G28 X                         # Re-home X (eliminates rack/twist error)
    G28 Z                         # Home Z (all 3 motors)

    # ---- 3. WAIT FOR ACTIVE BED ZONE(S) ----
    {% if use_left and use_right %}
        TEMPERATURE_WAIT SENSOR=heater_bed              MINIMUM={BED_TEMP - 2}
        TEMPERATURE_WAIT SENSOR="heater_generic bed_right" MINIMUM={BED_TEMP - 2}
    {% elif use_left %}
        TEMPERATURE_WAIT SENSOR=heater_bed              MINIMUM={BED_TEMP - 2}
    {% else %}
        TEMPERATURE_WAIT SENSOR="heater_generic bed_right" MINIMUM={BED_TEMP - 2}
    {% endif %}

    M109 S150                     # Hold nozzle at safe temp during probing

    # ---- 4. Z TILT (3-point gantry leveling, 3 passes) ----
    Z_TILT_ADJUST
    Z_TILT_ADJUST
    Z_TILT_ADJUST

    # ---- 5. BED MESH (adaptive, 5x5, print area only) ----
    BED_MESH_CLEAR
    BED_MESH_CALIBRATE ALGORITHM=bicubic \
        MESH_MIN={area_start_x},{area_start_y} \
        MESH_MAX={area_end_x},{area_end_y} \
        PROBE_COUNT=5,5

    # ---- 6. HEAT NOZZLE TO PRINT TEMP ----
    G1 X175 Y10 Z10 F6000
    M109 S{EXTRUDER_TEMP}

    # ---- 7. PURGE LINES ----
    # Line 1 — THIN (wets nozzle, sets flow)
    G92 E0
    G1 X10  Y10  Z0.25 F3000
    G1 X10  Y340 Z0.25 E12 F1500
    G92 E0

    # Line 2 — THICK (wipes nozzle clean)
    G1 X12  Y340 Z0.30 F3000
    G1 X12  Y10  Z0.30 E20 F900
    G92 E0

    # ---- 8. MOVE TO PRINT START ----
    G1 Z2.0 F3000
    G1 X{area_start_x} Y{area_start_y} F6000
    G1 Z0.2 F300
    M117 Printing...


# =====================================================
# PRINT_END MACRO — also shuts down correct heaters
# =====================================================

[gcode_macro PRINT_END]
gcode:
    G91
    G1 Z10 F3000
    G90
    G1 X175 Y340 F6000            # Park at rear center
    M104 S0                       # Nozzle off
    M140 S0                       # Left bed off
    SET_HEATER_TEMPERATURE HEATER=bed_right TARGET=0  # Right bed off
    M84                           # Motors off
    BED_MESH_CLEAR
    M117 Print Complete
