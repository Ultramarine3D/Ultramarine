#####################################################
# Manta M8P V2 + EBBCan (EBB36) – Klipper Config
#####################################################

[include ebb36.cfg]  # Include your EBBCan extruder/probe/fan config

[virtual_sdcard]
path: /home/ultramarine/printer_data/gcodes

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_15000F001751313434373135-if00
restart_method: command

[printer]
kinematics: corexy
max_velocity: 150
max_accel: 1500
max_z_velocity: 8
max_z_accel: 20

[resonance_tester]
accel_chip: adxl345
probe_points:
    175,175,20

[input_shaper]

#####################################################
# Stepper Motors – X/Y/Z
#####################################################

# Motor A → X
[stepper_x]
step_pin: PE6
dir_pin: !PE5
enable_pin: !PC14
microsteps: 16
rotation_distance: 40
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_endstop: 0
position_max: 350
homing_speed: 25
homing_retract_dist: 10

[tmc2209 stepper_x]
uart_pin: PC13
diag_pin: ^PF4
run_current: 0.85 #1.2
stealthchop_threshold: 0
driver_SGTHRS: 19

# Motor B → Y
[stepper_y]
step_pin: PE2
dir_pin: !PE1
enable_pin: !PE4
microsteps: 16
rotation_distance: 40
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: 0
position_max: 350
homing_speed: 25
homing_retract_dist: 10

[tmc2209 stepper_y]
uart_pin: PE3
diag_pin: ^PF3
run_current: 0.85 #1.2
stealthchop_threshold: 0
driver_SGTHRS: 15

# Z0 → Motor5
[stepper_z]
step_pin: PG13
dir_pin: PG12
enable_pin: !PG15
microsteps: 16
rotation_distance: 4
endstop_pin: probe:z_virtual_endstop
position_min: -17.0
position_max: 270
homing_speed: 10
second_homing_speed: 5
homing_retract_dist: 5

[tmc2209 stepper_z]
uart_pin: PG14
run_current: 0.50
stealthchop_threshold: 0

# Z1 → Motor6
[stepper_z1]
step_pin: PG9
dir_pin: PD7
enable_pin: !PG11
microsteps: 16
rotation_distance: 4

[tmc2209 stepper_z1]
uart_pin: PG10
run_current: 0.50
stealthchop_threshold: 0

# Z2 → Motor7
[stepper_z2]
step_pin: PB4
dir_pin: PB3
enable_pin: !PB6
microsteps: 16
rotation_distance: 4

[tmc2209 stepper_z2]
uart_pin: PB5
run_current: 0.50
stealthchop_threshold: 0

#####################################################
# Fans
#####################################################

#[fan]
#pin: EBBCan: PA0
#kick_start_time: 0.5

#[heater_fan fan1]
#pin: EBBCan: PA1
#heater: extruder
#heater_temp: 20

#[fan]
#pin: PF8
#kick_start_time: 0.5


#####################################################
# Heated Bed
#####################################################
[heater_bed]
heater_pin: PA1         # Change to your actual bed MOSFET pin
sensor_type: EPCOS 100K B57560G104F     # Standard 100K NTC thermistor
sensor_pin: PB1
#control: pid
#pid_Kp: 60.0
#pid_Ki: 1.2
#pid_Kd: 300
min_temp: 0
max_temp: 95



[display_status]

#####################################################
# Z Tilt
#####################################################

[z_tilt]
z_positions:
    350, 360
    200, 10
    10, 360
points:
    300, 340
    180, 75
    50, 340
speed: 200
horizontal_move_z: 20
retries: 5
retry_tolerance: 0.005

#####################################################
# Bed Mesh
#####################################################

[bed_mesh]
speed: 200
horizontal_move_z: 20
mesh_min: 30, 30
mesh_max: 320, 320
probe_count: 10,10
algorithm: bicubic
fade_start: 1
fade_end: 10

#####################################################
# Include Klicky macros
#####################################################
[include klicky-probe.cfg]

#####################################################
# Pause / Resume / Cancel Macros (Standalone)
#####################################################
[gcode_macro PRINT_START]
gcode:
    # --- Parameters passed from slicer ---
    {% set BED_TEMP      = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}
    {% set AREA_START    = params.AREA_START|default("0,0")|string %}
    {% set AREA_END      = params.AREA_END|default("350,350")|string %}

    # --- Parse print area ---
    {% set area_start_x = AREA_START.split(",")[0]|float %}
    {% set area_start_y = AREA_START.split(",")[1]|float %}
    {% set area_end_x   = AREA_END.split(",")[0]|float %}
    {% set area_end_y   = AREA_END.split(",")[1]|float %}

    # --- Dual heater zone logic (split at X=175) ---
    # Heater names must match your printer.cfg: [heater_bed] and [heater_generic bed_right]
    # or [heater_bed left] / [heater_bed right] — adjust SET_HEATER_TEMPERATURE calls below
    {% set BED_MID = 175.0 %}
    {% set use_left  = true if area_start_x < BED_MID else false %}
    {% set use_right = true if area_end_x   > BED_MID else false %}

    # ---- 1. SELECTIVE BED HEATING (no-wait) ----
    {% if use_left and use_right %}
        M117 Heating: BOTH sides
        M140 S{BED_TEMP}                                          # Main bed heater (left zone)
        SET_HEATER_TEMPERATURE HEATER=bed_right TARGET={BED_TEMP} # Right zone heater
    {% elif use_left %}
        M117 Heating: LEFT side only
        M140 S{BED_TEMP}                                          # Left zone heater only
        SET_HEATER_TEMPERATURE HEATER=bed_right TARGET=0          # Right zone OFF
    {% else %}
        M117 Heating: RIGHT side only
        M140 S0                                                    # Left zone OFF
        SET_HEATER_TEMPERATURE HEATER=bed_right TARGET={BED_TEMP} # Right zone heater only
    {% endif %}

    M104 S150                     # Preheat nozzle to no-drip temp

    # ---- 2. HOME SEQUENCE: X → Y → X → Z ----
    G28 X                         # Home X first
    G28 Y                         # Home Y
    G28 X                         # Re-home X (eliminates rack/twist error)
    G28 Z                         # Home Z (all 3 motors)

    # ---- 3. WAIT FOR ACTIVE BED ZONE(S) ----
    {% if use_left and use_right %}
        TEMPERATURE_WAIT SENSOR=heater_bed              MINIMUM={BED_TEMP - 2}
        TEMPERATURE_WAIT SENSOR="heater_generic bed_right" MINIMUM={BED_TEMP - 2}
    {% elif use_left %}
        TEMPERATURE_WAIT SENSOR=heater_bed              MINIMUM={BED_TEMP - 2}
    {% else %}
        TEMPERATURE_WAIT SENSOR="heater_generic bed_right" MINIMUM={BED_TEMP - 2}
    {% endif %}

    M109 S150                     # Hold nozzle at safe temp during probing

    # ---- 4. Z TILT (3-point gantry leveling, 3 passes) ----
    Z_TILT_ADJUST

    # ---- 5. BED MESH (adaptive, 5x5, print area only) ----
    BED_MESH_CLEAR
    BED_MESH_CALIBRATE ALGORITHM=bicubic \
        MESH_MIN={area_start_x},{area_start_y} \
        MESH_MAX={area_end_x},{area_end_y} \
        PROBE_COUNT=5,5

    # ---- 6. HEAT NOZZLE TO PRINT TEMP ----
    G1 X175 Y10 Z10 F6000
    M109 S{EXTRUDER_TEMP}

    # ---- 7. PURGE LINES ----
    # Line 1 — THIN (wets nozzle, sets flow)
    G92 E0
    G1 X10  Y10  Z0.25 F3000
    G1 X10  Y340 Z0.25 E12 F1500
    G92 E0

    # Line 2 — THICK (wipes nozzle clean)
    G1 X12  Y340 Z0.30 F3000
    G1 X12  Y10  Z0.30 E20 F900
    G92 E0

    # ---- 8. MOVE TO PRINT START ----
    G1 Z2.0 F3000
    G1 X{area_start_x} Y{area_start_y} F6000
    G1 Z0.2 F300
    M117 Printing...



[gcode_macro PAUSE]
description: Pause the current print
variable_extrude: 10.0
gcode:
    {% set z = printer.toolhead.position.z %}
    {% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}
    {% set lift = 10.0 %}
    {% if z + lift > max_z %}
        {% set lift = max_z - z %}
    {% endif %}

    SAVE_GCODE_STATE NAME=PAUSE_state
    G91
    G1 Z{lift} F600
    G90
    G1 X10 Y10 F6000
    M83
    G1 E-{printer["gcode_macro PAUSE"].extrude} F1800

[gcode_macro RESUME]
description: Resume the current print
gcode:
    M83
    G1 E10.0 F1800
    RESTORE_GCODE_STATE NAME=PAUSE_state MOVE=1

[gcode_macro CANCEL_PRINT]
rename_existing: CANCEL_PRINT_BASE
gcode:
    # ---- SAVE CURRENT POSITION ----
    {% set x_park = 175 %}
    {% set y_park = 340 %}
    {% set z_hop  = [printer.toolhead.position.z + 10, printer.toolhead.axis_maximum.z]|min %}

    # ---- STOP HEATERS IMMEDIATELY ----
    M104 S0                                           # Nozzle off
    M140 S0                                           # Left bed off
    SET_HEATER_TEMPERATURE HEATER=bed_right TARGET=0  # Right bed off

    # ---- RETRACT & PARK ----
    SAVE_GCODE_STATE NAME=CANCEL_STATE
    G91
    G1 E-3 F3600                  # Retract 3mm to reduce ooze
    G90
    G1 Z{z_hop} F3000             # Lift Z (capped at max)
    G1 X{x_park} Y{y_park} F6000 # Park at rear center

    # ---- CANCEL & CLEANUP ----
    CANCEL_PRINT_BASE             # Klipper's internal cancel
    M107                          # Fan off
    M84                           # Motors off
    BED_MESH_CLEAR
    RESTORE_GCODE_STATE NAME=CANCEL_STATE
    M117 Print Cancelled

[gcode_macro PRINT_END]
gcode:
    G91
    G1 Z20 F3000
    G90
    G1 X175 Y340 F6000            # Park at rear center
    M104 S0                       # Nozzle off
    M140 S0                       # Left bed off
    SET_HEATER_TEMPERATURE HEATER=bed_right TARGET=0  # Right bed off
    M84                           # Motors off
    BED_MESH_CLEAR
    M117 Print Complete

